<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade Exams - Smart Proctoring</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; background:#f5f7fa; margin:0; }
    .header { background:#fff; padding:18px 28px; box-shadow:0 2px 12px rgba(0,0,0,.08); display:flex; justify-content:space-between; align-items:center; }
    .header h1 { margin:0; font-size:20px; color:#2c3e50; }
    .btn { border:none; border-radius:10px; padding:10px 14px; cursor:pointer; font-weight:700; }
    .btn-back { background:#9b59b6; color:#fff; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .card { background:#fff; border-radius:14px; padding:18px; box-shadow:0 5px 15px rgba(0,0,0,.05); margin-top:16px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid #eee; text-align:left; }
    th { background:#f8f9fa; color:#2c3e50; }
    .pill { padding:4px 10px; border-radius:999px; font-weight:800; font-size:12px; }
    .pill-good { background:#d4edda; color:#155724; }
    .pill-warn { background:#fff3cd; color:#856404; }
  </style>
</head>
<body>
  <div class="header">
    <h1>✅ Grade Exams (Submissions)</h1>
    <button class="btn btn-back" onclick="goBack()">← Back</button>
  </div>

  <div class="wrap">
    <div class="card">
      <h3 style="margin:0 0 12px 0;">Latest Results</h3>
      <table>
        <thead>
          <tr>
            <th>Exam</th>
            <th>Student</th>
            <th>Score</th>
            <th>Focus</th>
            <th>Alerts</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    function goBack(){ window.location.href="instructor-dashboard.html"; }

    async function loadResults() {
      const res = await fetch("http://localhost:5000/api/admin/results");
      const data = await res.json();
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "";
      (data.results || []).slice().reverse().forEach(r => {
        const scorePill = (r.score >= 80) ? "pill-good" : "pill-warn";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.examId}</td>
          <td>${r.studentName} (${r.studentId})</td>
          <td><span class="pill ${scorePill}">${r.score}/${r.maxScore}</span></td>
          <td>${r.focusScore ?? ""}</td>
          <td>${r.alertCount ?? 0}</td>
          <td>${new Date(r.submittedAt).toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadResults();
    setInterval(loadResults, 5000);
  </script>
</body>
</html>
