<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitoring Dashboard - Instructor</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --dark: #1f2937;
            --light: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(30, 41, 59, 0.9);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exam-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .exam-select {
            background: rgba(15, 23, 42, 0.8);
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            border: 1px solid #334155;
            min-width: 120px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
        }

        .stat.high-alerts .stat-value {
            color: #ef4444;
        }

        .stat.active .stat-value {
            color: #10b981;
        }

        /* Main Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        /* Students Grid */
        .students-grid {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            border: 1px solid #475569;
            overflow: hidden;
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .students-list {
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .student-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            border: 1px solid #334155;
            margin-bottom: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .student-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .student-card.selected {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .student-card.suspicious {
            border-left: 4px solid var(--danger);
        }

        .student-card.warning {
            border-left: 4px solid var(--warning);
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .student-details h4 {
            color: #f8fafc;
            margin-bottom: 3px;
        }

        .student-details p {
            font-size: 12px;
            color: #94a3b8;
        }

        .alert-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .alert-badge.high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .alert-badge.medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .alert-badge.low {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .student-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label-small {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 3px;
        }

        .stat-value-small {
            font-size: 14px;
            font-weight: bold;
            color: #f8fafc;
        }

        /* Live Feed Section */
        .live-feed-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Main Video Feed */
        .video-container {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            border: 1px solid #475569;
            overflow: hidden;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: linear-gradient(135deg, #1e293b, #334155);
        }

        .selected-student-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .selected-student-info h3 {
            color: #f8fafc;
        }

        .student-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .video-controls {
            display: flex;
            gap: 10px;
        }

        .btn-control {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-control:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-control.alert {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-control.alert:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .video-feed {
            position: relative;
            width: 100%;
            height: 400px;
            background: #000;
            overflow: hidden;
        }

        #liveStudentVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .live-metrics {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 12px;
            color: #94a3b8;
            min-width: 100px;
        }

        .metric-value {
            font-size: 14px;
            font-weight: bold;
            color: #f8fafc;
        }

        .focus-bar {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-left: 10px;
        }

        .focus-fill {
            height: 100%;
            transition: width 0.5s;
        }

        .focus-fill.high {
            background: #10b981;
        }

        .focus-fill.medium {
            background: #f59e0b;
        }

        .focus-fill.low {
            background: #ef4444;
        }

        /* Alerts Feed */
        .alerts-container {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            border: 1px solid #475569;
            overflow: hidden;
        }

        .alerts-list {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
        }

        .alert-item.high {
            border-left: 4px solid var(--danger);
        }

        .alert-item.medium {
            border-left: 4px solid var(--warning);
        }

        .alert-item.low {
            border-left: 4px solid var(--success);
        }

        .alert-icon {
            font-size: 18px;
            margin-top: 2px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .alert-title {
            font-weight: bold;
            color: #f8fafc;
        }

        .alert-student {
            font-size: 12px;
            color: #94a3b8;
            background: rgba(30, 41, 59, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .alert-details {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .alert-time {
            font-size: 11px;
            color: #94a3b8;
        }

        .alert-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-small {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-dismiss {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-dismiss:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn-view {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .btn-view:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        /* Controls Panel */
        .controls-panel {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            border: 1px solid #475569;
            padding: 20px;
        }

        .controls-panel h3 {
            color: #f8fafc;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 13px;
            color: #94a3b8;
        }

        .control-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .control-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn-send:hover {
            background: var(--primary-dark);
        }

        .btn-flag {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn-flag:hover {
            background: #dc2626;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 14px;
        }

        /* No Selection State */
        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #94a3b8;
        }

        .no-selection-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📡 Live Proctoring Dashboard</h1>
            <div class="exam-info">
                <select class="exam-select" id="examSelect">
                    <option value="CS401">CS401 - Computer Science Final</option>
                    <option value="CS305">CS305 - Database Systems Quiz</option>
                    <option value="CS302">CS302 - Algorithms Midterm</option>
                </select>
                <div class="header-stats">
                    <div class="stat active">
                        <div class="stat-value" id="activeStudents">0</div>
                        <div class="stat-label">Active Students</div>
                    </div>
                    <div class="stat high-alerts">
                        <div class="stat-value" id="highAlerts">0</div>
                        <div class="stat-label">High Alerts</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="avgFocus">0%</div>
                        <div class="stat-label">Avg Focus</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard">
            <!-- Left: Students Grid -->
            <div class="students-grid">
                <div class="section-header">
                    <h2>👥 Active Students</h2>
                    <div class="section-controls">
                        <button class="btn btn-refresh" onclick="loadStudents()">
                            ↻ Refresh
                        </button>
                    </div>
                </div>
                <div class="students-list" id="studentsList">
                    <!-- Students will be loaded here -->
                </div>
            </div>

            <!-- Right: Live Feed & Controls -->
            <div class="live-feed-section">
                <!-- Main Video Feed -->
                <div class="video-container">
                    <div class="video-header">
                        <div class="selected-student-info" id="selectedStudentInfo">
                            <h3>Select a student to monitor</h3>
                        </div>
                        <div class="video-controls" id="videoControls" style="display: none;">
                            <button class="btn-control" onclick="pauseResumeVideo()">
                                ⏸️ Pause
                            </button>
                            <button class="btn-control" onclick="takeScreenshot()">
                                📸 Screenshot
                            </button>
                            <button class="btn-control alert" onclick="sendAlert()">
                                🚨 Send Alert
                            </button>
                        </div>
                    </div>
                    <div class="video-feed" id="videoFeed">
                        <div class="no-selection" id="noSelection">
                            <div class="no-selection-icon">👨‍🎓</div>
                            <p>Select a student from the list to view live feed</p>
                        </div>
                        <video id="liveStudentVideo" style="display: none;"></video>
                        <div class="video-overlay" id="videoOverlay" style="display: none;">
                            <div class="live-metrics" id="liveMetrics">
                                <!-- Live metrics will appear here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Alerts Feed -->
                <div class="alerts-container">
                    <div class="section-header">
                        <h2>🚨 Live Alerts Feed</h2>
                        <button class="btn btn-refresh" onclick="clearAlerts()">
                            Clear All
                        </button>
                    </div>
                    <div class="alerts-list" id="alertsList">
                        <!-- Alerts will appear here -->
                    </div>
                </div>

                <!-- Controls Panel -->
                <div class="controls-panel">
                    <h3>🎯 Student Controls</h3>
                    <div class="controls-grid">
                        <div class="control-group">
                            <label class="control-label">Send Message:</label>
                            <input type="text" 
                                   class="control-input" 
                                   id="messageInput" 
                                   placeholder="Type message for student...">
                            <button class="btn btn-send" onclick="sendMessage()">
                                📩 Send Message
                            </button>
                        </div>
                        <div class="control-group">
                            <label class="control-label">Flag Student:</label>
                            <input type="text" 
                                   class="control-input" 
                                   id="flagReason" 
                                   placeholder="Reason for flagging...">
                            <button class="btn btn-flag" onclick="flagStudent()">
                                🚩 Flag Student
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Smart Proctoring System | Live Monitoring Dashboard | Real-time AI Proctoring</p>
        </div>
    </div>

    <!-- WebSocket Client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <script>
        // Configuration
        const CONFIG = {
            WS_URL: 'http://localhost:5000',
            API_URL: 'http://localhost:5000/api',
            EXAM_ID: 'CS401'
        };

        // Global state
        const state = {
            socket: null,
            selectedStudent: null,
            activeStudents: [],
            alerts: [],
            examId: CONFIG.EXAM_ID,
            videoPaused: false,
            instructorId: 'I1001'
        };

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Load instructor from localStorage
            const instructor = JSON.parse(localStorage.getItem('instructor') || 
                JSON.stringify({
                    id: 'I1001',
                    name: 'Dr. Jane Instructor',
                    email: 'instructor@example.com'
                }));
            
            // Initialize WebSocket connection
            initializeWebSocket(instructor.id);
            
            // Load initial data
            loadStudents();
            loadExamStats();
            
            // Set up exam selector
            document.getElementById('examSelect').addEventListener('change', function(e) {
                state.examId = e.target.value;
                loadStudents();
                loadExamStats();
            });
            
            // Auto-refresh every 10 seconds
            setInterval(loadStudents, 10000);
            setInterval(loadExamStats, 5000);
        });

        // Initialize WebSocket connection
        function initializeWebSocket(instructorId) {
            console.log('🔌 Connecting to monitoring server...');
            
            state.socket = io(CONFIG.WS_URL, {
                transports: ['websocket']
            });

            state.socket.on('connect', () => {
                console.log('✅ Connected to monitoring server');
                
                // Authenticate as instructor
                state.socket.emit('authenticate', {
                    role: 'instructor',
                    userId: instructorId
                });
            });

            // Handle incoming student video
            state.socket.on('student_video', (data) => {
                if (state.selectedStudent && data.studentId === state.selectedStudent.id) {
                    updateStudentVideo(data.frame);
                }
            });

            // Handle new alerts
            state.socket.on('new_alert', (data) => {
                addAlert(data);
                updateAlertStats();
                
                // Show notification
                if (data.severity === 'HIGH') {
                    showNotification(data.studentId, data.alert);
                }
            });

            // Handle active students list
            state.socket.on('active_students', (data) => {
                updateStudentsList(data.students);
            });

            // Handle student connections
            state.socket.on('student_connected', (data) => {
                console.log('Student connected:', data.userId);
                loadStudents(); // Refresh list
            });

            state.socket.on('student_disconnected', (data) => {
                console.log('Student disconnected:', data.userId);
                loadStudents(); // Refresh list
                
                // Clear selection if disconnected student was selected
                if (state.selectedStudent && state.selectedStudent.id === data.userId) {
                    clearStudentSelection();
                }
            });

            state.socket.on('disconnect', () => {
                console.log('❌ Disconnected from monitoring server');
            });
        }

        // Load active students
        async function loadStudents() {
            try {
                const response = await fetch(`${CONFIG.API_URL}/exams/sessions/active`);
                const data = await response.json();
                
                if (data.success) {
                    updateStudentsList(data.sessions);
                }
            } catch (error) {
                console.error('Error loading students:', error);
                // Fallback to mock data
                loadMockStudents();
            }
        }

        // Update students list UI
        function updateStudentsList(students) {
            state.activeStudents = students;
            
            const studentsList = document.getElementById('studentsList');
            const activeStudentsCount = document.getElementById('activeStudents');
            
            activeStudentsCount.textContent = students.length;
            
            if (students.length === 0) {
                studentsList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #94a3b8;">
                        <div style="font-size: 48px; margin-bottom: 20px;">👨‍🎓</div>
                        <p>No active students for this exam</p>
                        <small>Waiting for students to start exams...</small>
                    </div>
                `;
                return;
            }
            
            studentsList.innerHTML = students.map(student => {
                const alertCount = student.alerts?.length || 0;
                const alertLevel = alertCount > 5 ? 'high' : alertCount > 2 ? 'medium' : 'low';
                const focusScore = student.focusScore || 100;
                const focusClass = focusScore > 70 ? 'high' : focusScore > 40 ? 'medium' : 'low';
                
                return `
                    <div class="student-card ${state.selectedStudent?.id === student.studentId ? 'selected' : ''} ${alertLevel === 'high' ? 'suspicious' : alertLevel === 'medium' ? 'warning' : ''}" 
                         onclick="selectStudent(${JSON.stringify(student).replace(/"/g, '&quot;')})">
                        <div class="student-header">
                            <div class="student-info">
                                <div class="student-avatar">
                                    ${student.studentName?.charAt(0) || 'S'}
                                </div>
                                <div class="student-details">
                                    <h4>${student.studentName || 'Student'}</h4>
                                    <p>${student.studentId || 'ID: Unknown'}</p>
                                </div>
                            </div>
                            <div class="alert-badge ${alertLevel}">
                                ${alertCount} alert${alertCount !== 1 ? 's' : ''}
                            </div>
                        </div>
                        <div class="student-stats">
                            <div class="stat-item">
                                <div class="stat-label-small">Focus</div>
                                <div class="stat-value-small ${focusClass}">
                                    ${focusScore}%
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label-small">Time</div>
                                <div class="stat-value-small">
                                    ${formatDuration(student.startTime)}
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label-small">Status</div>
                                <div class="stat-value-small ${student.cameraActive ? 'success' : 'warning'}">
                                    ${student.cameraActive ? '📹 Active' : '📴 Inactive'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load exam statistics
        async function loadExamStats() {
            try {
                const response = await fetch(`${CONFIG.API_URL}/exams/instructor/dashboard`);
                const data = await response.json();
                
                if (data.success) {
                    updateDashboardStats(data);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Update dashboard statistics
        function updateDashboardStats(data) {
            // Update high alerts count
            const highAlerts = data.alerts?.filter(a => a.severity === 'HIGH').length || 0;
            document.getElementById('highAlerts').textContent = highAlerts;
            
            // Calculate average focus score
            if (state.activeStudents.length > 0) {
                const avgFocus = Math.round(
                    state.activeStudents.reduce((sum, s) => sum + (s.focusScore || 100), 0) / 
                    state.activeStudents.length
                );
                document.getElementById('avgFocus').textContent = `${avgFocus}%`;
            }
        }

        // Select a student for monitoring
        function selectStudent(student) {
            state.selectedStudent = student;
            
            // Update UI
            updateStudentSelectionUI();
            
            // Request video feed for this student
            requestStudentFeed(student.studentId);
            
            // Show video controls
            document.getElementById('videoControls').style.display = 'flex';
            document.getElementById('noSelection').style.display = 'none';
            document.getElementById('liveStudentVideo').style.display = 'block';
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        // Update UI when student is selected
        function updateStudentSelectionUI() {
            const student = state.selectedStudent;
            
            // Update header
            document.getElementById('selectedStudentInfo').innerHTML = `
                <h3>${student.studentName}</h3>
                <div class="student-status ${student.alertCount > 5 ? 'status-warning' : 'status-active'}">
                    ${student.alertCount > 5 ? '⚠️ Suspicious' : '✅ Monitoring'}
                </div>
            `;
            
            // Update live metrics
            updateLiveMetrics(student);
            
            // Highlight selected student in list
            document.querySelectorAll('.student-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Find and highlight the selected card
            const selectedCard = Array.from(document.querySelectorAll('.student-card'))
                .find(card => card.querySelector('h4')?.textContent === student.studentName);
            
            if (selectedCard) {
                selectedCard.classList.add('selected');
                selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Request video feed for a student
        function requestStudentFeed(studentId) {
            if (state.socket && state.socket.connected) {
                state.socket.emit('request_feed', {
                    studentId: studentId,
                    examId: state.examId
                });
            }
        }

        // Update student video feed
        function updateStudentVideo(frameData) {
            const videoElement = document.getElementById('liveStudentVideo');
            
            // Create a blob from base64 data
            const byteCharacters = atob(frameData.split(',')[1]);
            const byteNumbers = new Array(byteCharacters.length);
            
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: 'image/jpeg' });
            const imageUrl = URL.createObjectURL(blob);
            
            // Create an image element
            const img = new Image();
            img.onload = function() {
                // Draw image on canvas (simulating video)
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                // Convert canvas to video-like display
                if (!state.videoPaused) {
                    videoElement.src = canvas.toDataURL('image/jpeg');
                }
                
                URL.revokeObjectURL(imageUrl);
            };
            img.src = imageUrl;
        }

        // Update live metrics display
        function updateLiveMetrics(student) {
            const metricsDiv = document.getElementById('liveMetrics');
            const focusScore = student.focusScore || 100;
            const focusClass = focusScore > 70 ? 'high' : focusScore > 40 ? 'medium' : 'low';
            
            metricsDiv.innerHTML = `
                <div class="metric-row">
                    <span class="metric-label">Focus Score:</span>
                    <span class="metric-value">${focusScore}%</span>
                    <div class="focus-bar">
                        <div class="focus-fill ${focusClass}" style="width: ${focusScore}%"></div>
                    </div>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Alerts:</span>
                    <span class="metric-value ${student.alertCount > 5 ? 'danger' : ''}">
                        ${student.alertCount || 0}
                    </span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Time Elapsed:</span>
                    <span class="metric-value">${formatDuration(student.startTime)}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Camera Status:</span>
                    <span class="metric-value ${student.cameraActive ? 'success' : 'warning'}">
                        ${student.cameraActive ? 'Active' : 'Inactive'}
                    </span>
                </div>
            `;
        }

        // Add alert to feed
        function addAlert(alertData) {
            const alert = {
                id: Date.now() + Math.random(),
                studentId: alertData.studentId,
                studentName: getStudentName(alertData.studentId),
                type: alertData.alert?.type || 'ALERT',
                severity: alertData.severity || 'MEDIUM',
                details: alertData.alert?.details || alertData.alert || 'Unknown issue',
                timestamp: alertData.timestamp || new Date().toISOString()
            };
            
            state.alerts.unshift(alert);
            
            // Keep only last 20 alerts
            if (state.alerts.length > 20) {
                state.alerts.pop();
            }
            
            // Update UI
            updateAlertsList();
            
            return alert;
        }

                        <p>No alerts at the moment</p>
                        <small>All students are following exam rules</small>
