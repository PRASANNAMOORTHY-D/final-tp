<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor Analytics - Smart Proctoring</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; background:#f5f7fa; margin:0; }
    .header { background:#fff; padding:18px 28px; box-shadow:0 2px 12px rgba(0,0,0,.08); display:flex; justify-content:space-between; align-items:center; }
    .header h1 { margin:0; font-size:20px; color:#2c3e50; }
    .btn { border:none; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:600; }
    .btn-back { background:#9b59b6; color:#fff; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 5px 15px rgba(0,0,0,.05); }
    .label { color:#7f8c8d; font-size:13px; }
    .value { font-size:28px; font-weight:800; color:#2c3e50; margin-top:6px; }
    .small { color:#7f8c8d; font-size:13px; margin-top:6px; }
    .error { color:#c0392b; font-weight:700; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Instructor Analytics</h1>
    <button class="btn btn-back" onclick="goBack()">← Back</button>
  </div>

  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="label">Total Exams</div>
        <div class="value" id="totalExams">--</div>
        <div class="small">All created exams</div>
      </div>
      <div class="card">
        <div class="label">Total Students</div>
        <div class="value" id="totalStudents">--</div>
        <div class="small">Registered students</div>
      </div>
      <div class="card">
        <div class="label">Total Submissions</div>
        <div class="value" id="totalResults">--</div>
        <div class="small">Exam results stored</div>
      </div>
      <div class="card">
        <div class="label">Average Score</div>
        <div class="value" id="avgScore">--</div>
        <div class="small">Across all submissions</div>
      </div>
    </div>

    <p id="status" class="small"></p>
  </div>

  <script>
    function goBack() {
      window.location.href = "instructor-dashboard.html";
    }

    async function loadAnalytics() {
      const status = document.getElementById("status");
      status.textContent = "Loading analytics…";
      try {
        const res = await fetch("http://localhost:5000/api/admin/analytics");
        const data = await res.json();
        if (!data.success) throw new Error(data.message || "Failed");

        document.getElementById("totalExams").textContent = data.analytics.totalExams;
        document.getElementById("totalStudents").textContent = data.analytics.totalStudents;
        document.getElementById("totalResults").textContent = data.analytics.totalResults;
        document.getElementById("avgScore").textContent = data.analytics.avgScore + "%";
        status.textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (e) {
        status.innerHTML = '<span class="error">Error:</span> ' + e.message;
      }
    }

    loadAnalytics();
  </script>
</body>
</html>
